<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F6B4B" />
      <stop offset="100%" stop-color="#073B28" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B" />
      <stop offset="50%" stop-color="#D4A017" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.4" />

  <!-- Radiating Beams of Knowledge Light / Sun Rays -->
  <g opacity="0.25">
    <line x1="256" y1="210" x2="256" y2="40" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="256" y1="210" x2="426" y2="100" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="256" y1="210" x2="426" y2="320" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="256" y1="210" x2="256" y2="420" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="256" y1="210" x2="86" y2="320" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <line x1="256" y1="210" x2="86" y2="100" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Central Light / Glowing Torch Flame -->
  <path d="M256,120 C280,170 300,195 290,230 C280,265 232,265 222,230 C212,195 232,170 256,120 Z" 
        fill="url(#goldGrad)" 
        filter="url(#glow)" />

  <!-- Glowing core spark -->
  <circle cx="256" cy="205" r="22" fill="#FFFFFF" opacity="0.9" filter="url(#glow)" />

  <!-- Elegant Open Book (Knowledge Base) Support -->
  <path d="M120,330 C180,310 240,335 256,345 C272,335 332,310 392,330 L392,270 C332,250 272,275 256,285 C240,275 180,250 120,270 Z" 
        fill="#FFFFFF" 
        stroke="url(#goldGrad)" 
        stroke-width="5" 
        stroke-linejoin="round" />
        
  <!-- Book pages stack shadow -->
  <path d="M120,330 L120,338 C180,318 240,343 256,353 C272,343 332,318 392,338 L392,330" 
        fill="none" 
        stroke="#D4A017" 
        stroke-width="4" 
        stroke-linecap="round" />
  
  <!-- Subtle Arabic / Latin Calligraphic Star Accent -->
  <polygon points="256,295 261,304 271,304 263,310 266,319 256,313 246,319 249,310 241,304 251,304" 
           fill="url(#goldGrad)" />
</svg>
